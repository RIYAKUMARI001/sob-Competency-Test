name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: shopstr-mcp/package-lock.json

      - name: Install dependencies
        working-directory: shopstr-mcp
        run: npm ci

      - name: Type-check
        working-directory: shopstr-mcp
        run: npm run lint

      - name: Run tests
        working-directory: shopstr-mcp
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shopstr-mcp/package-lock.json

      - name: Install dependencies
        working-directory: shopstr-mcp
        run: npm ci

      - name: Build
        working-directory: shopstr-mcp
        run: npm run build

      - name: Verify entrypoint exists
        run: test -f shopstr-mcp/dist/index.js
